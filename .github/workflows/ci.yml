name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check (backend)
        run: ruff check backend/

      - name: Ruff check (SDK — Python)
        run: ruff check sdk/python/

  # ── SDK — Python tests ────────────────────────────────────────────────────
  sdk-python-tests:
    name: SDK Python tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install SDK
        working-directory: sdk/python
        run: pip install -e ".[dev]"

      - name: Run SDK tests
        working-directory: sdk/python
        run: |
          pytest tests/ -v \
            --junitxml=../../test-results/sdk-python-${{ matrix.python-version }}.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-python-results-${{ matrix.python-version }}
          path: test-results/sdk-python-${{ matrix.python-version }}.xml

  # ── SDK — TypeScript tests ─────────────────────────────────────────────────
  sdk-typescript-tests:
    name: SDK TypeScript tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        working-directory: sdk/typescript
        run: npm ci

      - name: Test
        working-directory: sdk/typescript
        run: npm test -- --reporter=junit --outputFile=../../test-results/sdk-typescript.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-typescript-results
          path: test-results/sdk-typescript.xml

  # ── Backend tests (with PostgreSQL) ───────────────────────────────────────
  backend-tests:
    name: Backend tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: pramana
          POSTGRES_PASSWORD: pramana_ci
          POSTGRES_DB: pramana_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pramana"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PRAMANA_TEST_DATABASE_URL: postgresql://pramana:pramana_ci@localhost:5432/pramana_test
      AUTH_JWT_SECRET: ci-test-secret
      AUTH_JWT_ISSUER: pramana-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-test.txt

      - name: Run migrations
        working-directory: backend
        run: |
          DATABASE_URL=$PRAMANA_TEST_DATABASE_URL \
          python -m alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        run: |
          pytest tests/ -v \
            --junitxml=../test-results/backend-${{ matrix.python-version }}.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-results-${{ matrix.python-version }}
          path: test-results/backend-${{ matrix.python-version }}.xml

  # ── E2E tests ──────────────────────────────────────────────────────────────
  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: [sdk-python-tests, backend-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend deps
        run: |
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-test.txt

      - name: Install SDK
        working-directory: sdk/python
        run: pip install -e ".[dev]"

      - name: Generate synthetic data
        run: python tests/synthetic/generate.py

      - name: Run E2E tests
        run: |
          pytest tests/e2e/ -v \
            --junitxml=test-results/e2e.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/e2e.xml
